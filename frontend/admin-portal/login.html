<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GigShield Admin — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">🛡️ GigShield</div>
      <div class="login-subtitle">Admin & Insurer Portal</div>

      <div class="form-group">
        <label for="phone">Admin Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 9000000000" autofocus/>
      </div>

      <button class="login-btn" id="login-btn" onclick="submitLogin()">Login</button>
      <div class="error-msg" id="error-msg"></div>
      <div class="login-note">Default admin phone: <strong>9000000000</strong></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem("gigshield_admin_token")) {
      window.location.href = "dashboard.html";
    }

    async function submitLogin() {
      const phone  = document.getElementById("phone").value.trim();
      const btn    = document.getElementById("login-btn");
      const errMsg = document.getElementById("error-msg");
      errMsg.textContent = "";

      if (!phone) { errMsg.textContent = "Please enter your phone number."; return; }

      btn.disabled = true; btn.textContent = "Logging in...";
      const result = await handleLogin(phone);

      if (result.success) {
        window.location.href = "dashboard.html";
      } else {
        errMsg.textContent = result.message;
        btn.disabled = false; btn.textContent = "Login";
      }
    }

    document.getElementById("phone").addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitLogin();
    });
  </script>
</body>
</html>
