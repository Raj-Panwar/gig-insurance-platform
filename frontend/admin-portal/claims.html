<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GigShield Admin — Claims</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="brand">🛡️ GigShield Admin</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="workers.html">Workers</a>
      <a href="policies.html">Policies</a>
      <a href="claims.html" class="active">Claims</a>
      <a href="payouts.html">Payouts</a>
      <a href="simulate.html">Simulate</a>
    </div>
    <div style="display:flex;align-items:center;">
      <span class="admin-info">Logged in as: <strong id="admin-name"></strong></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">🗂️ Claims Management</div>
        <div class="page-subtitle">Auto-generated by parametric trigger engine. PENDING claims can be manually paid out.</div>
      </div>
    </div>

    <p id="loading" class="loading">Loading claims...</p>

    <div id="content" style="display:none;">
      <div class="table-controls">
        <span class="count-label" id="claim-count"></span>
        <select class="filter-select" id="status-filter">
          <option value="ALL">All Statuses</option>
          <option value="APPROVED">APPROVED</option>
          <option value="PENDING">PENDING</option>
          <option value="FLAGGED">FLAGGED</option>
          <option value="REJECTED">REJECTED</option>
          <option value="PAID">PAID</option>
        </select>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>Claim ID</th><th>User ID</th><th>Policy ID</th><th>Trigger Type</th><th>Status</th><th>Created At</th><th>Action</th></tr>
          </thead>
          <tbody id="claims-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/claims.js"></script>
</body>
</html>
